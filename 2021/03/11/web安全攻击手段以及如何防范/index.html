</head><body><header><div class="header row"> <a href="/" class="logo-link"><img src="/images/logo.png"></a><ul id="nav_list" class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" data-hover="博文" class="nav-list-link">博文</a></li><li class="nav-list-item"><a href="/archives/" target="_self" data-hover="归档" class="nav-list-link">归档</a></li></ul><div class="search"><a id="search_btn" href="#search"></a></div><div id="nav_btn" class="nav-btn"><span></span><span></span><span></span></div></div></header><div class="row scroll-con"><section class="container"><!-- for archive page--><div id="postAr" class="post"><article class="post-block"><h1 class="post-title">web安全攻击手段以及如何防范</h1><div class="post-info">2021-03-11</div><div class="post-content"><p>常见的有xss, csrf, sql注入</p>
<h2 id="xss-cross-site-scripting-跨站脚本攻击"><a href="#xss-cross-site-scripting-跨站脚本攻击" class="headerlink" title="xss(cross site scripting) 跨站脚本攻击"></a><strong>xss(cross site scripting) 跨站脚本攻击</strong></h2><p>定义: 指攻击者在网页嵌入脚本，用户浏览网页触发恶意脚本执行</p>
<blockquote>
<p>XSS攻击分为3类：存储型（持久型）、反射型（非持久型）、基于DOM</p>
</blockquote>
<p>如何防范:</p>
<blockquote>
<ul>
<li>设置HttpOnly以避免cookie劫持的危险 </li>
<li>过滤，对诸如<script>、<img>、<a>等标签进行过滤 </li>
<li>编码，像一些常见的符号，如&lt;&gt;在输入的时候要对其进行转换编码 </li>
<li>限制，对于一些可以预期的输入可以通过限制长度强制截断来进行防御</li>
</ul>
</blockquote>
<h2 id="csrf-cross-site-request-forgery-跨站请求伪造"><a href="#csrf-cross-site-request-forgery-跨站请求伪造" class="headerlink" title="csrf(cross site request forgery) 跨站请求伪造"></a><strong>csrf(cross site request forgery) 跨站请求伪造</strong></h2><p>定义: 是一种劫持受信任用户向服务器发送非预期请求的攻击方式</p>
<p>如何防范:</p>
<blockquote>
<ul>
<li>验证 HTTP Referer 字段</li>
<li>请求地址中添加 token 并验证</li>
<li>HTTP 头中自定义属性并验证</li>
</ul>
</blockquote>
<h2 id="sql注入-SQL-injection"><a href="#sql注入-SQL-injection" class="headerlink" title="sql注入(SQL injection)"></a><strong>sql注入(SQL injection)</strong></h2><p>定义: 在未授权情况下，非法访问数据库信息</p>
<p>如何防范:</p>
<blockquote>
<ul>
<li>杜绝用户提交的参数入库并且执行 </li>
<li>在代码层，不准出现sql语句 </li>
<li>在web输入参数处，对所有的参数做sql转义 </li>
<li>上线测试，需要使用sql自动注入工具进行所有的页面sql注入测试</li>
</ul>
</blockquote>
